<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDCET Mock Tests 2024-25</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --card: #1e2330;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #f7a24f;
    --green: #3ecf8e;
    --red: #f75555;
    --text: #e8eaf0;
    --muted: #8892a4;
    --be01: #4f8ef7;
    --be02: #f7a24f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LANDING */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a2540 0%, var(--bg) 60%);
  }

  .logo-bar {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  h1.hero {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1.05;
    text-align: center;
    margin-bottom: 12px;
  }

  h1.hero span { color: var(--accent); }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 48px;
  }

  .tests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }

  .test-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .test-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .test-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(79, 142, 247, 0.15);
  }

  .test-card:hover::before { opacity: 1; }

  .test-num {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .test-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .test-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .tag.be01 { background: rgba(79,142,247,0.15); color: var(--be01); }
  .tag.be02 { background: rgba(247,162,79,0.15); color: var(--be02); }

  /* EXAM SCREEN */
  #exam-screen {
    display: none;
    min-height: 100vh;
    background: var(--bg);
  }

  .exam-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .exam-title-bar {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  .timer-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .timer-box.warning { border-color: var(--accent2); color: var(--accent2); }
  .timer-box.danger { border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .progress-bar-wrap {
    flex: 1;
    max-width: 300px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s;
  }

  .exam-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-badge {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .section-badge.be01 { background: rgba(79,142,247,0.2); color: var(--be01); }
  .section-badge.be02 { background: rgba(247,162,79,0.2); color: var(--be02); }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .q-card.answered { border-color: rgba(79,142,247,0.4); }
  .q-card.correct { border-color: var(--green); background: rgba(62,207,142,0.05); }
  .q-card.incorrect { border-color: var(--red); background: rgba(247,85,85,0.05); }

  .q-number {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.6;
    font-weight: 500;
    margin-bottom: 18px;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  @media (max-width: 600px) {
    .options { grid-template-columns: 1fr; }
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
  }

  .option-btn:hover { border-color: var(--accent); background: rgba(79,142,247,0.08); }

  .option-btn.selected { border-color: var(--accent); background: rgba(79,142,247,0.15); }

  .option-btn.correct-ans { border-color: var(--green); background: rgba(62,207,142,0.15); color: var(--green); }
  .option-btn.wrong-ans { border-color: var(--red); background: rgba(247,85,85,0.12); color: var(--red); }

  .opt-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Passage */
  .passage-box {
    background: rgba(79,142,247,0.05);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 12px;
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: #c8d0e0;
    margin-bottom: 20px;
  }

  .passage-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Bottom bar */
  .exam-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,15,20,0.97);
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 100;
  }

  .answered-count {
    font-size: 13px;
    color: var(--muted);
  }

  .answered-count span { color: var(--text); font-weight: 600; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #3a7ae8; transform: translateY(-1px); }

  .btn-submit {
    background: linear-gradient(135deg, var(--green), #29b87a);
    color: white;
  }

  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(62,207,142,0.3); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* RESULTS */
  #result-screen {
    display: none;
    min-height: 100vh;
    padding: 40px 20px;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, #0f1d35 0%, var(--bg) 60%);
  }

  .result-inner {
    max-width: 800px;
    margin: 0 auto;
  }

  .result-hero {
    text-align: center;
    margin-bottom: 48px;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
    background: var(--card);
  }

  .score-number {
    font-family: 'Syne', sans-serif;
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
  }

  .score-total {
    font-size: 13px;
    color: var(--muted);
  }

  .result-label {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .result-sub { color: var(--muted); font-size: 14px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .stat-label { font-size: 12px; color: var(--muted); }

  .result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  /* Review section in results */
  .review-section { margin-top: 8px; }

  .review-topic-head {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .explanation-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(62,207,142,0.07);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #9de8c4;
    line-height: 1.6;
    display: none;
  }

  .q-card.correct .explanation-box,
  .q-card.incorrect .explanation-box { display: block; }

  /* Confirm dialog */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .overlay.active { display: flex; }

  .dialog {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }

  .dialog h3 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .dialog p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .dialog-btns { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="logo-bar">Gujarat Technological University</div>
  <h1 class="hero">DDCET <span>Mock Tests</span></h1>
  <p class="hero-sub">2024–25 · 4 Full-Length Tests · 100 Questions Each · 150 Minutes</p>
  <div class="tests-grid" id="tests-grid"></div>
</div>

<!-- EXAM -->
<div id="exam-screen">
  <div class="exam-header">
    <div class="exam-title-bar" id="exam-title-bar">Mock Test 1</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="timer-box" id="timer-box">⏱ 2:30:00</div>
  </div>
  <div class="exam-body" id="exam-body"></div>
  <div class="exam-footer">
    <div class="answered-count">Answered: <span id="answered-count">0</span> / 100</div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="backToLanding()">✕ Exit</button>
      <button class="btn btn-submit" onclick="confirmSubmit()">Submit Test →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="result-screen">
  <div class="result-inner">
    <div class="result-hero">
      <div class="score-circle" id="score-circle">
        <div class="score-number" id="score-number">0</div>
        <div class="score-total">/ 200</div>
      </div>
      <div class="result-label" id="result-label">Great Work!</div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="result-actions">
      <button class="btn btn-outline" onclick="backToLanding()">← Back to Tests</button>
      <button class="btn btn-primary" onclick="reviewAnswers()">Review Answers</button>
    </div>
    <div class="review-section" id="review-section"></div>
  </div>
</div>

<!-- SUBMIT DIALOG -->
<div class="overlay" id="submit-overlay">
  <div class="dialog">
    <h3>Submit Test?</h3>
    <p id="dialog-msg">Are you sure you want to submit? You can't change answers after submission.</p>
    <div class="dialog-btns">
      <button class="btn btn-outline" onclick="closeDialog()">Cancel</button>
      <button class="btn btn-submit" onclick="submitTest()">Submit Now</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ALL 4 MOCK TESTS DATA
// Structure: each test = { be01: [...50 questions], be02: [...50 questions] }
// Each question: { topic, q, opts:[A,B,C,D], ans:'A'|'B'|'C'|'D', exp }
// ============================================================

const TESTS = [

// ===================== TEST 1 =====================
{
  title: "Mock Test 1",
  be01: [
    // Units & Measurement (6)
    {topic:"Units & Measurement", q:"Which of the following is a fundamental (base) unit in the SI system?", opts:["Newton","Pascal","Kilogram","Joule"], ans:"C", exp:"The kilogram (kg) is one of the 7 base SI units. Newton, Pascal, and Joule are derived units."},
    {topic:"Units & Measurement", q:"1 metre = ___ centimetres (CGS unit).", opts:["10","100","1000","0.01"], ans:"B", exp:"1 m = 100 cm. CGS uses centimetre as the base length unit."},
    {topic:"Units & Measurement", q:"The percentage error is defined as:", opts:["Absolute error × 100","(Absolute error / True value) × 100","Relative error + 100","Mean error / 100"], ans:"B", exp:"Percentage error = (Absolute error / True value) × 100."},
    {topic:"Units & Measurement", q:"A Vernier caliper has a least count of:", opts:["0.1 mm","0.01 mm","1 mm","0.001 mm"], ans:"B", exp:"The standard least count of a Vernier caliper is 0.1 mm = 0.01 cm."},
    {topic:"Units & Measurement", q:"The SI unit of pressure is:", opts:["Newton","Joule","Pascal","Bar"], ans:"C", exp:"Pascal (Pa) = N/m² is the SI unit of pressure."},
    {topic:"Units & Measurement", q:"Propagation of error in the product Z = A × B is given by:", opts:["ΔZ = ΔA + ΔB","ΔZ/Z = ΔA/A + ΔB/B","ΔZ/Z = ΔA/A - ΔB/B","ΔZ = ΔA × ΔB"], ans:"B", exp:"For product or quotient, relative errors add: ΔZ/Z = ΔA/A + ΔB/B."},
    // Classical Mechanics (6)
    {topic:"Classical Mechanics", q:"Newton's first law of motion is also called:", opts:["Law of momentum","Law of inertia","Law of acceleration","Law of gravitation"], ans:"B", exp:"Newton's first law states that a body continues in its state of rest or uniform motion unless acted upon by an external force — this is the law of inertia."},
    {topic:"Classical Mechanics", q:"The SI unit of force is:", opts:["Joule","Watt","Newton","Pascal"], ans:"C", exp:"Force is measured in Newton (N) = kg·m/s²."},
    {topic:"Classical Mechanics", q:"Kinetic energy is given by:", opts:["mgh","½mv²","mv","Fs"], ans:"B", exp:"Kinetic energy KE = ½mv², where m is mass and v is velocity."},
    {topic:"Classical Mechanics", q:"Centripetal force acts in which direction?", opts:["Tangent to the circle","Away from the centre","Towards the centre","Perpendicular to velocity"], ans:"C", exp:"Centripetal force always points towards the centre of the circular path."},
    {topic:"Classical Mechanics", q:"Impulse of a force equals:", opts:["Force × distance","Force × time","Mass × acceleration","Work done per unit time"], ans:"B", exp:"Impulse = Force × time = Change in momentum."},
    {topic:"Classical Mechanics", q:"Power is defined as:", opts:["Force × displacement","Work done / time","Mass × velocity","Energy × time"], ans:"B", exp:"Power = Work done per unit time = W/t, measured in Watts."},
    // Electric Current (6)
    {topic:"Electric Current", q:"Ohm's Law states that:", opts:["V = IR","V = I/R","R = VI","I = VR"], ans:"A", exp:"Ohm's Law: Voltage (V) = Current (I) × Resistance (R)."},
    {topic:"Electric Current", q:"The SI unit of electric charge is:", opts:["Ampere","Volt","Coulomb","Farad"], ans:"C", exp:"Electric charge is measured in Coulombs (C). 1 C = 1 A·s."},
    {topic:"Electric Current", q:"In a parallel combination of resistors, the equivalent resistance is:", opts:["Sum of all resistances","Greater than the largest resistance","Less than the smallest resistance","Equal to the average resistance"], ans:"C", exp:"In parallel combination, 1/Req = 1/R1 + 1/R2 + ..., so Req is less than the smallest individual resistance."},
    {topic:"Electric Current", q:"Coulomb's law states that the force between two charges is:", opts:["Directly proportional to the product of charges and inversely proportional to distance squared","Directly proportional to distance","Independent of medium","Inversely proportional to the product of charges"], ans:"A", exp:"F = kq₁q₂/r², force is directly proportional to the product of charges and inversely proportional to the square of distance."},
    {topic:"Electric Current", q:"Capacitance is measured in:", opts:["Ohm","Henry","Farad","Weber"], ans:"C", exp:"Capacitance is measured in Farads (F). 1 F = 1 C/V."},
    {topic:"Electric Current", q:"Which material has the highest electrical conductivity?", opts:["Iron","Copper","Silver","Aluminium"], ans:"C", exp:"Silver has the highest electrical conductivity among all metals."},
    // Heat & Thermometry (6)
    {topic:"Heat & Thermometry", q:"The freezing point of water on the Kelvin scale is:", opts:["0 K","100 K","273 K","373 K"], ans:"C", exp:"0°C = 273 K (more precisely 273.15 K). The freezing point of water is 273 K."},
    {topic:"Heat & Thermometry", q:"Which mode of heat transfer does NOT require a material medium?", opts:["Conduction","Convection","Radiation","All require medium"], ans:"C", exp:"Radiation can transfer heat through vacuum. Conduction and convection require a material medium."},
    {topic:"Heat & Thermometry", q:"The specific heat capacity of water is approximately:", opts:["1 J/kg·K","420 J/kg·K","4200 J/kg·K","42000 J/kg·K"], ans:"C", exp:"Specific heat of water ≈ 4200 J/kg·K (or 4.2 J/g·K)."},
    {topic:"Heat & Thermometry", q:"Convert 100°C to Fahrenheit:", opts:["200°F","212°F","180°F","32°F"], ans:"B", exp:"°F = (9/5)°C + 32 = (9/5)(100) + 32 = 180 + 32 = 212°F."},
    {topic:"Heat & Thermometry", q:"The coefficient of linear thermal expansion (α) relates to:", opts:["Change in volume","Change in area","Change in length per degree rise in temperature","Heat capacity"], ans:"C", exp:"α = ΔL / (L₀ × ΔT), it gives fractional change in length per degree of temperature change."},
    {topic:"Heat & Thermometry", q:"Heat capacity is the amount of heat required to:", opts:["Raise temperature of 1 g by 1°C","Raise temperature of a body by 1°C","Change the state of a substance","All of the above"], ans:"B", exp:"Heat capacity is the heat required to raise the temperature of a given body (not per unit mass) by 1°C."},
    // Waves, Optics & Acoustics (6)
    {topic:"Waves, Optics & Acoustics", q:"In which type of wave do the particles vibrate perpendicular to the direction of propagation?", opts:["Longitudinal","Transverse","Stationary","Mechanical"], ans:"B", exp:"In transverse waves, particle vibration is perpendicular to wave propagation. Example: light waves."},
    {topic:"Waves, Optics & Acoustics", q:"Snell's law relates:", opts:["Frequency and wavelength","Angles of incidence and refraction","Amplitude and intensity","Frequency and time period"], ans:"B", exp:"Snell's law: n₁ sin θ₁ = n₂ sin θ₂, relating angles of incidence and refraction with refractive indices."},
    {topic:"Waves, Optics & Acoustics", q:"The phenomenon used in optical fibres for transmission is:", opts:["Reflection","Refraction","Total internal reflection","Diffraction"], ans:"C", exp:"Optical fibres work on total internal reflection — light is reflected internally at the core-cladding interface."},
    {topic:"Waves, Optics & Acoustics", q:"The time for one complete oscillation is called:", opts:["Frequency","Amplitude","Period","Wavelength"], ans:"C", exp:"Time period (T) is the time for one complete oscillation. Frequency f = 1/T."},

// ============================================================
// APP STATE
// ============================================================
let currentTest = null;
let currentTestIndex = -1;
let userAnswers = {};
let timerInterval = null;
let timeLeft = 9000; // 150 minutes
let submitted = false;

// ============================================================
// LANDING PAGE
// ============================================================
function renderLanding() {
  const grid = document.getElementById('tests-grid');
  grid.innerHTML = TESTS.map((t, i) => `
    <div class="test-card" onclick="startTest(${i})">
      <div class="test-num">Test ${i+1}</div>
      <div class="test-title">${t.title}</div>
      <div class="test-meta">100 Questions · 200 Marks · 150 Min</div>
      <div class="tags">
        <span class="tag be01">BE-01 Science</span>
        <span class="tag be02">BE-02 Aptitude</span>
      </div>
    </div>
  `).join('');
}

// ============================================================
// START TEST
// ============================================================
function startTest(idx) {
  currentTestIndex = idx;
  currentTest = TESTS[idx];
  userAnswers = {};
  submitted = false;
  timeLeft = 9000;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.getElementById('exam-title-bar').textContent = currentTest.title;

  renderExam();
  startTimer();
  window.scrollTo(0, 0);
}

// ============================================================
// RENDER EXAM
// ============================================================
function renderExam() {
  const body = document.getElementById('exam-body');
  let html = '';
  let qNum = 0;

  // BE-01 Section
  html += `<div class="section-header"><span class="section-badge be01">BE-01</span><span class="section-title">Basics of Science & Engineering</span></div>`;

  let currentTopic = '';
  currentTest.be01.forEach((q, i) => {
    qNum++;
    const qId = `be01_${i}`;
    html += renderQuestion(q, qNum, qId);
  });

  // BE-02 Section
  html += `<div class="section-header" style="margin-top:48px"><span class="section-badge be02">BE-02</span><span class="section-title">Aptitude Test — Mathematics & Soft Skills</span></div>`;

  // Group BE-02 by passage for comprehension
  let passageRendered = false;
  currentTest.be02.forEach((q, i) => {
    qNum++;
    const qId = `be02_${i}`;
    if (q.topic === 'Comprehension' && !passageRendered) {
      // Extract passage from first comprehension question
      const passageMatch = q.q.match(/\[Passage\]([\s\S]*?)\n\n/);
      if (passageMatch) {
        html += `<div class="passage-box"><div class="passage-title">📄 Read the Passage</div>${passageMatch[1].trim()}</div>`;
        passageRendered = true;
      }
    }
    html += renderQuestion(q, qNum, qId);
  });

  body.innerHTML = html;
}

function renderQuestion(q, num, qId) {
  const opts = ['A','B','C','D'];
  // For comprehension, strip the [Passage] prefix
  let qText = q.q.replace(/\[Passage\][\s\S]*?\n\n/, '').replace(/\[Same Passage\] /, '');

  return `
    <div class="q-card" id="card_${qId}">
      <div class="q-number">Q${num} · ${q.topic}</div>
      <div class="q-text">${qText}</div>
      <div class="options" id="opts_${qId}">
        ${q.opts.map((opt, j) => `
          <button class="option-btn" id="opt_${qId}_${j}" onclick="selectAnswer('${qId}', ${j}, '${qId}')">
            <span class="opt-label">${opts[j]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation-box" id="exp_${qId}">${q.exp}</div>
    </div>
  `;
}

function selectAnswer(qId, optIdx, cardId) {
  if (submitted) return;
  userAnswers[qId] = optIdx;

  // Update UI
  const opts = document.querySelectorAll(`#opts_${qId} .option-btn`);
  opts.forEach((b, i) => {
    b.classList.remove('selected');
    if (i === optIdx) b.classList.add('selected');
  });

  document.getElementById(`card_${qId}`).classList.add('answered');
  updateProgress();
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      submitTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(timeLeft / 3600);
  const m = Math.floor((timeLeft % 3600) / 60);
  const s = timeLeft % 60;
  const str = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const box = document.getElementById('timer-box');
  box.textContent = `⏱ ${str}`;
  box.className = 'timer-box';
  if (timeLeft < 600) box.classList.add('danger');
  else if (timeLeft < 1800) box.classList.add('warning');
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('progress-fill').style.width = `${(answered/100)*100}%`;
}

// ============================================================
// SUBMIT
// ============================================================
function confirmSubmit() {
  const answered = Object.keys(userAnswers).length;
  const unanswered = 100 - answered;
  document.getElementById('dialog-msg').textContent = `You have answered ${answered} questions. ${unanswered} questions are unanswered. Submit now?`;
  document.getElementById('submit-overlay').classList.add('active');
}

function closeDialog() {
  document.getElementById('submit-overlay').classList.remove('active');
}

function submitTest() {
  closeDialog();
  submitted = true;
  clearInterval(timerInterval);

  // Calculate scores
  const allQ = [...currentTest.be01.map((q,i) => ({...q, id:`be01_${i}`})),
                 ...currentTest.be02.map((q,i) => ({...q, id:`be02_${i}`}))];

  let correct = 0, wrong = 0, unattempted = 0;
  const opts = ['A','B','C','D'];

  allQ.forEach(q => {
    const userAns = userAnswers[q.id];
    if (userAns === undefined) {
      unattempted++;
    } else if (opts[userAns] === q.ans) {
      correct++;
    } else {
      wrong++;
    }
  });

  const score = correct * 2; // 2 marks each

  showResults(correct, wrong, unattempted, score, allQ);
}

// ============================================================
// RESULTS
// ============================================================
function showResults(correct, wrong, unattempted, score, allQ) {
  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('review-section').innerHTML = '';
  window.scrollTo(0, 0);

  // Score circle color
  const pct = (score / 200) * 100;
  const circle = document.getElementById('score-circle');
  if (pct >= 75) circle.style.borderColor = 'var(--green)';
  else if (pct >= 50) circle.style.borderColor = 'var(--accent2)';
  else circle.style.borderColor = 'var(--red)';

  document.getElementById('score-number').textContent = score;

  let label, sub;
  if (pct >= 80) { label = '🏆 Excellent!'; sub = 'Outstanding performance! You are well-prepared for DDCET.'; }
  else if (pct >= 65) { label = '✅ Good Job!'; sub = 'Solid performance. A little more revision and you\'re ready!'; }
  else if (pct >= 50) { label = '📚 Keep Going!'; sub = 'Average score. Focus on weaker topics to improve.'; }
  else { label = '💪 Keep Practising!'; sub = 'Review the syllabus and retry. Practice makes perfect!'; }

  document.getElementById('result-label').textContent = label;
  document.getElementById('result-sub').textContent = sub;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="stat-value" style="color:var(--green)">${correct}</div><div class="stat-label">Correct (×2)</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--red)">${wrong}</div><div class="stat-label">Wrong</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--muted)">${unattempted}</div><div class="stat-label">Unattempted</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--accent)">${score}</div><div class="stat-label">Total Score /200</div></div>
  `;

  // Store for review
  window._allQ = allQ;
  window._userAnswers = userAnswers;
}

function reviewAnswers() {
  const allQ = window._allQ;
  const opts = ['A','B','C','D'];
  const reviewDiv = document.getElementById('review-section');

  // Group by topic
  const byTopic = {};
  allQ.forEach((q, idx) => {
    if (!byTopic[q.topic]) byTopic[q.topic] = [];
    byTopic[q.topic].push({...q, globalIdx: idx + 1});
  });

  let html = '<h2 style="font-family:Syne;font-size:20px;font-weight:800;margin-bottom:8px">Answer Review</h2>';

  Object.entries(byTopic).forEach(([topic, qs]) => {
    html += `<div class="review-topic-head">${topic}</div>`;
    qs.forEach(q => {
      const userAns = userAnswers[q.id];
      const isCorrect = userAns !== undefined && opts[userAns] === q.ans;
      const isWrong = userAns !== undefined && opts[userAns] !== q.ans;
      const cardClass = isCorrect ? 'correct' : isWrong ? 'incorrect' : '';
      let qText = q.q.replace(/\[Passage\][\s\S]*?\n\n/, '').replace(/\[Same Passage\] /, '');

      html += `
        <div class="q-card ${cardClass}">
          <div class="q-number">Q${q.globalIdx} · ${isCorrect ? '✅ Correct' : isWrong ? '❌ Wrong' : '⬜ Not Attempted'}</div>
          <div class="q-text">${qText}</div>
          <div class="options">
            ${q.opts.map((opt, j) => {
              let cls = 'option-btn';
              if (opts[j] === q.ans) cls += ' correct-ans';
              else if (userAns === j && opts[j] !== q.ans) cls += ' wrong-ans';
              return `<button class="${cls}" disabled><span class="opt-label">${opts[j]}</span><span>${opt}</span></button>`;
            }).join('')}
          </div>
          <div class="explanation-box">${q.exp}</div>
        </div>
      `;
    });
  });

  reviewDiv.innerHTML = html;
  reviewDiv.scrollIntoView({behavior:'smooth'});
}

function backToLanding() {
  clearInterval(timerInterval);
  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  window.scrollTo(0, 0);
}

// Fix: Q14 in Test 4 answer correction
TESTS[3].be02[14].ans = "D";

// Init
renderLanding();
</script>
